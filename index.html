<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
<title>GL CP 投票PK · 为你最爱的CP打call</title>
<style>
:root{--bg:#fdf2f8;--card:#fff;--text:#1a1a2e;--sub:#6b7280;--pink:#ec4899;--purple:#8b5cf6;--accent:linear-gradient(135deg,#ec4899,#8b5cf6);--border:#f0d5e8;--shadow:0 4px 24px rgba(236,72,153,.08);--radius:20px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(236,72,153,.04) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(139,92,246,.04) 0%,transparent 50%);z-index:-1}
.container{max-width:480px;margin:0 auto;padding:16px}
.header{text-align:center;padding:28px 16px 16px}
.header h1{font-size:28px;font-weight:800;background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.header .sub{font-size:14px;color:var(--sub)}
.tabs{display:flex;gap:8px;margin-bottom:20px;background:var(--card);border-radius:var(--radius);padding:4px;box-shadow:var(--shadow)}
.tab{flex:1;text-align:center;padding:12px;border-radius:16px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;border:none;background:transparent;color:var(--sub)}
.tab.active{background:var(--accent);color:#fff}
.section{display:none}
.section.active{display:block}
.cp-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;cursor:pointer;transition:.15s;border:2px solid transparent;position:relative}
.cp-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(236,72,153,.12)}
.cp-card.voted{border-color:var(--pink)}
.cp-card .rank{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;background:var(--bg);flex-shrink:0}
.cp-card .rank.top1{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;font-size:22px}
.cp-card .rank.top2{background:linear-gradient(135deg,#c0c0c0,#9ca3af);color:#fff}
.cp-card .rank.top3{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
.cp-card .info{flex:1;min-width:0}
.cp-card .cp-name{font-size:18px;font-weight:700;margin-bottom:2px}
.cp-card .cp-from{font-size:12px;color:var(--sub)}
.cp-card .votes{text-align:center;flex-shrink:0}
.cp-card .votes .num{font-size:24px;font-weight:800;background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cp-card .votes .label{font-size:11px;color:var(--sub)}
.cp-card .voted-mark{position:absolute;top:10px;right:14px;font-size:12px;color:var(--pink);font-weight:600}
.vote-btn{background:var(--accent);color:#fff;border:none;padding:12px 28px;border-radius:99px;font-size:16px;font-weight:700;cursor:pointer;display:block;width:100%;max-width:300px;margin:24px auto;transition:.15s}
.vote-btn:hover{opacity:.9;transform:scale(1.02)}
.vote-btn:disabled{opacity:.4;cursor:default;transform:none}
.poster-area{text-align:center;padding:20px 0}
.poster-preview{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);display:none;margin:16px 0}
.poster-preview img{width:100%;display:block}
.result-bar{height:8px;border-radius:4px;background:var(--border);margin-top:8px;overflow:hidden}
.result-bar .fill{height:100%;border-radius:4px;background:var(--accent);transition:width .5s}
.total-votes{text-align:center;color:var(--sub);font-size:13px;margin:8px 0 16px}
.ref-badge{text-align:center;font-size:13px;color:var(--purple);font-weight:600;margin:8px 0;display:none}
.footer{text-align:center;padding:24px 16px;color:var(--sub);font-size:12px}
.footer a{color:var(--purple);text-decoration:none}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:99px;font-size:14px;font-weight:600;z-index:100;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
@keyframes heartBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.3)}30%{transform:scale(1)}45%{transform:scale(1.2)}}
.heart{animation:heartBeat 1.5s infinite;display:inline-block}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>GL CP 投票PK</h1>
    <p class="sub">为你最爱的CP投上一票，生成专属海报分享打call</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('vote')">投票</button>
    <button class="tab" onclick="switchTab('results')">排行</button>
  </div>

  <div id="ref-badge" class="ref-badge">🎯 朋友邀请你来投票</div>

  <div id="vote-section" class="section active">
    <div id="cp-list"></div>
    <button class="vote-btn" id="vote-submit-btn" disabled onclick="submitVote()">请选择一对CP投票</button>
  </div>

  <div id="results-section" class="section">
    <div class="total-votes" id="total-votes">加载中...</div>
    <div id="results-list"></div>
    <div class="poster-area" id="poster-area">
      <div class="poster-preview" id="poster-preview"><img id="poster-img" alt="拉票海报"></div>
      <button class="vote-btn" id="poster-btn" style="display:none" onclick="generatePoster()">🎨 生成拉票海报</button>
      <button class="vote-btn" id="download-btn" style="display:none" onclick="downloadPoster()">⬇️ 下载海报</button>
    </div>
  </div>

  <div class="footer">
    <p>GL CP Vote · 纯属娱乐 · <a href="?data" onclick="showData();return false">📊 查看数据</a></p>
    <p style="margin-top:4px"><a href="?ref=share_demo" onclick="copyShareLink();return false">📋 复制分享链接</a></p>
  </div>

  <div id="data-panel" style="display:none;background:var(--card);border-radius:var(--radius);padding:24px;margin-top:16px;box-shadow:var(--shadow)">
    <h3 style="margin-bottom:16px">📊 数据面板 <span style="font-size:12px;color:var(--sub);font-weight:400">（本浏览器数据）</span></h3>
    <div style="display:grid;gap:12px;font-size:14px">
      <div style="padding:12px;background:var(--bg);border-radius:12px" id="data-votes"></div>
      <div style="padding:12px;background:var(--bg);border-radius:12px" id="data-shares"></div>
      <div style="padding:12px;background:var(--bg);border-radius:12px" id="data-refs"></div>
      <div style="padding:12px;background:var(--bg);border-radius:12px;font-size:12px;color:var(--sub)">
        <p>设备指纹: <code id="data-fp"></code></p>
        <p>投票状态: <span id="data-voted"></span></p>
        <p>投给了: <span id="data-myvote"></span></p>
        <p style="margin-top:8px">💡 真实数据需接数据库。本面板仅显示当前浏览器 localStorage 数据。</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ══════════════════════════════════════════
// GL CP 投票PK · 纯静态MVP
// ══════════════════════════════════════════

// ── Config ──
const SUPABASE_URL = 'https://oefzzmflkdoigfahbskc.supabase.co'
const SUPABASE_KEY = 'sb_publishable_R3EGbB23qba66lweHNbLjQ_gzxxVnqB'
let supabase = null
try { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) } catch(e) { console.warn('Supabase not loaded') }

// ── CP Data (MVP: hardcoded, P1: user-created) ──
const CP_LIST = [
  {id:1, name:'安达 × 岛村', from:'《安达与岛村》', votes:0, color:'#f472b6'},
  {id:2, name:'忧城 × 千景', from:'《恋语轻唱》', votes:0, color:'#a78bfa'},
  {id:3, name:'小糸侑 × 七海灯子', from:'《终将成为你》', votes:0, color:'#60a5fa'},
  {id:4, name:'鹿目圆 × 晓美焰', from:'《魔法少女小圆》', votes:0, color:'#fbbf24'},
  {id:5, name:'高町奈叶 × 菲特', from:'《魔法少女奈叶》', votes:0, color:'#fb923c'},
  {id:6, name:'伞木希美 × 铠冢霙', from:'《利兹与青鸟》', votes:0, color:'#34d399'},
]

// ── State ──
let selectedCP = null
let hasVoted = false
let deviceFingerprint = ''
let currentTab = 'vote'

// ── Init ──
async function init() {
  deviceFingerprint = getFingerprint()
  loadVotes()
  checkRef()
  renderCPList()
  renderResults()
}
init()

// ── Device Fingerprint (simple anti-cheat) ──
function getFingerprint() {
  const canvas = document.createElement('canvas')
  const ctx = canvas.getContext('2d')
  ctx.textBaseline = 'top'; ctx.font = '14px Arial'
  ctx.fillText('GLCPVote', 2, 2)
  const fp = canvas.toDataURL()
  const stored = localStorage.getItem('glcp_fp')
  if (!stored) {
    const fpId = 'fp_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36)
    localStorage.setItem('glcp_fp', fpId)
    return fpId
  }
  return stored
}

// ── Check Referral ──
function checkRef() {
  const params = new URLSearchParams(location.search)
  const ref = params.get('ref')
  if (ref) {
    document.getElementById('ref-badge').style.display = 'block'
    // Track referral
    const refs = JSON.parse(localStorage.getItem('glcp_refs') || '[]')
    if (!refs.includes(ref)) {
      refs.push(ref)
      localStorage.setItem('glcp_refs', JSON.stringify(refs))
    }
  }
}

// ── Load Votes from Supabase (fallback: localStorage) ──
async function loadVotes() {
  // Try Supabase first
  if (supabase) {
    try {
      const { data, error } = await supabase.from('votes').select('*')
      if (!error && data && data.length > 0) {
        data.forEach(row => {
          const cp = CP_LIST.find(c => c.id === row.cp_id)
          if (cp) cp.votes = row.count
        })
      } else {
        // Seed initial data
        CP_LIST.forEach(cp => { cp.votes = Math.floor(Math.random() * 50) + 10 })
      }
    } catch(e) {
      // Fallback to localStorage
      loadFromLocal()
    }
  } else {
    loadFromLocal()
  }

  // Check if this device already voted
  hasVoted = !!localStorage.getItem('glcp_voted_' + deviceFingerprint)
  if (hasVoted) {
    selectedCP = CP_LIST.find(c => c.id === parseInt(localStorage.getItem('glcp_myvote') || '0'))
  }
}

function loadFromLocal() {
  const stored = JSON.parse(localStorage.getItem('glcp_votes') || '{}')
  CP_LIST.forEach(cp => { cp.votes = stored[cp.id] || Math.floor(Math.random() * 50) + 10 })
}

async function saveVotes(cpId) {
  // Save to Supabase
  if (supabase) {
    try {
      const cp = CP_LIST.find(c => c.id === cpId)
      if (cp) {
        await supabase.from('votes').upsert({ cp_id: cpId, count: cp.votes, updated_at: new Date().toISOString() })
      }
    } catch(e) {}
  }
  // Also save to localStorage as fallback
  const data = {}
  CP_LIST.forEach(cp => { data[cp.id] = cp.votes })
  localStorage.setItem('glcp_votes', JSON.stringify(data))
}

// ── Render CP Cards ──
function renderCPList() {
  const container = document.getElementById('cp-list')
  container.innerHTML = CP_LIST.map((cp, i) => `
    <div class="cp-card ${cp.id === (selectedCP?.id) ? 'voted' : ''}" onclick="selectCP(${cp.id})">
      <div class="rank rank-top${i<3?(i+1):''}">${i+1}</div>
      <div class="info">
        <div class="cp-name">${cp.name}</div>
        <div class="cp-from">${cp.from}</div>
      </div>
      <div class="votes">
        <div class="num">${cp.votes}</div>
        <div class="label">票</div>
      </div>
      ${cp.id === (selectedCP?.id) ? '<div class="voted-mark">已投票 ✓</div>' : ''}
    </div>
  `).join('')

  updateVoteButton()
}

function renderResults() {
  const sorted = [...CP_LIST].sort((a, b) => b.votes - a.votes)
  const total = sorted.reduce((s, c) => s + c.votes, 0)
  const max = sorted[0]?.votes || 1

  document.getElementById('total-votes').textContent = `共 ${total} 票 · ${CP_LIST.length} 对CP参赛`
  document.getElementById('results-list').innerHTML = sorted.map((cp, i) => `
    <div class="cp-card" onclick="selectAndVote(${cp.id})">
      <div class="rank ${i<3?'top'+(i+1):''}">${i+1}</div>
      <div class="info" style="flex:1">
        <div class="cp-name">${cp.name}</div>
        <div class="cp-from">${cp.from}</div>
        <div class="result-bar"><div class="fill" style="width:${(cp.votes/max*100).toFixed(1)}%"></div></div>
      </div>
      <div class="votes">
        <div class="num">${cp.votes}</div>
        <div class="label">票 (${((cp.votes/total)*100).toFixed(1)}%)</div>
      </div>
    </div>
  `).join('')
}

// ── Vote Logic ──
function selectCP(id) {
  if (hasVoted) {
    showToast('你已经投过票了，快去生成海报吧！')
    return
  }
  selectedCP = CP_LIST.find(c => c.id === id)
  renderCPList()
}

function selectAndVote(id) {
  if (!hasVoted) {
    selectCP(id)
    submitVote()
  }
}

function updateVoteButton() {
  const btn = document.getElementById('vote-submit-btn')
  if (hasVoted) {
    btn.textContent = '✅ 已投票 · 去看看排行'
    btn.disabled = false
    btn.onclick = () => switchTab('results')
  } else if (selectedCP) {
    btn.textContent = `为「${selectedCP.name}」投票！`
    btn.disabled = false
  } else {
    btn.textContent = '请选择一对CP投票'
    btn.disabled = true
  }
}

async function submitVote() {
  if (!selectedCP || hasVoted) {
    if (hasVoted) switchTab('results')
    return
  }
  selectedCP.votes++
  hasVoted = true
  localStorage.setItem('glcp_voted_' + deviceFingerprint, '1')
  localStorage.setItem('glcp_myvote', String(selectedCP.id))
  await saveVotes(selectedCP.id)
  renderCPList()
  renderResults()
  updateVoteButton()
  showToast('投票成功！🎉 快去生成海报吧')

  // Auto switch to results after 1s
  setTimeout(() => {
    switchTab('results')
    document.getElementById('poster-btn').style.display = 'block'
  }, 800)
}

// ── Tab Switching ──
function switchTab(tab) {
  currentTab = tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
  if (tab === 'vote') {
    document.querySelector('.tab:first-child').classList.add('active')
    document.getElementById('vote-section').classList.add('active')
  } else {
    document.querySelector('.tab:last-child').classList.add('active')
    document.getElementById('results-section').classList.add('active')
    renderResults()
    if (hasVoted) {
      document.getElementById('poster-btn').style.display = 'block'
    }
  }
}

// ── Poster Generation ──
function generatePoster() {
  if (!selectedCP) { showToast('请先投票'); return }
  const canvas = document.createElement('canvas')
  canvas.width = 1080; canvas.height = 1920
  const ctx = canvas.getContext('2d')

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, 1920)
  bg.addColorStop(0, '#fdf2f8'); bg.addColorStop(0.4, '#ffffff'); bg.addColorStop(0.7, '#ffffff'); bg.addColorStop(1, '#fdf2f8')
  ctx.fillStyle = bg; ctx.fillRect(0, 0, 1080, 1920)

  // Decorative circles
  ctx.fillStyle = 'rgba(236,72,153,0.04)'; ctx.beginPath(); ctx.arc(200, 300, 400, 0, Math.PI*2); ctx.fill()
  ctx.fillStyle = 'rgba(139,92,246,0.04)'; ctx.beginPath(); ctx.arc(880, 1600, 500, 0, Math.PI*2); ctx.fill()

  // Title
  ctx.fillStyle = '#8b5cf6'; ctx.font = 'bold 32px system-ui,sans-serif'; ctx.textAlign = 'center'
  ctx.fillText('💜 GL CP 投票PK 💜', 540, 140)

  // CP name
  ctx.font = 'bold 90px system-ui,sans-serif'
  const grad = ctx.createLinearGradient(0, 300, 1080, 300)
  grad.addColorStop(0, '#ec4899'); grad.addColorStop(1, '#8b5cf6')
  ctx.fillStyle = grad
  const nameParts = selectedCP.name.split('×').join(' × ')
  ctx.fillText(nameParts, 540, 420)

  // From
  ctx.fillStyle = '#9ca3af'; ctx.font = '38px system-ui,sans-serif'
  ctx.fillText(selectedCP.from, 540, 520)

  // Votes
  ctx.fillStyle = grad; ctx.font = 'bold 200px system-ui,sans-serif'
  ctx.fillText(selectedCP.votes + ' 票', 540, 800)

  // Ranking
  const rank = [...CP_LIST].sort((a,b) => b.votes - a.votes).findIndex(c => c.id === selectedCP.id) + 1
  const total = CP_LIST.reduce((s,c) => s + c.votes, 0)
  ctx.fillStyle = '#6b7280'; ctx.font = '36px system-ui,sans-serif'
  ctx.fillText('第 ' + rank + ' 名 · 占比 ' + ((selectedCP.votes/total)*100).toFixed(1) + '%', 540, 920)

  const shareUrl = 'https://yang0000wu.github.io/gl-cp-vote/?ref=qr_' + selectedCP.id

  // Load QR code from API, draw when ready
  const qrImg = new Image()
  qrImg.crossOrigin = 'anonymous'
  qrImg.onload = function() {
    ctx.fillStyle = '#fff'; ctx.fillRect(380, 1060, 320, 320)
    ctx.drawImage(qrImg, 380, 1060, 320, 320)
    ctx.fillStyle = '#6b7280'; ctx.font = '24px system-ui,sans-serif'; ctx.textAlign = 'center'
    ctx.fillText('扫码投票支持 ' + selectedCP.name, 540, 1430)
    ctx.fillStyle = '#c0c0c0'; ctx.font = '20px system-ui,sans-serif'
    ctx.fillText(shareUrl, 540, 1480)
    ctx.fillStyle = '#d1d5db'; ctx.font = '24px system-ui,sans-serif'
    ctx.fillText('长按保存海报 · 分享到朋友圈为CP拉票', 540, 1560)
    finishPoster()
  }
  qrImg.onerror = function() {
    ctx.fillStyle = '#6b7280'; ctx.font = '28px system-ui,sans-serif'; ctx.textAlign = 'center'
    ctx.fillText('扫描二维码或访问链接投票', 540, 1300)
    ctx.fillStyle = '#c0c0c0'; ctx.font = '22px system-ui,sans-serif'
    ctx.fillText(shareUrl, 540, 1380)
    ctx.fillStyle = '#d1d5db'; ctx.font = '24px system-ui,sans-serif'
    ctx.fillText('长按保存海报 · 分享到朋友圈为CP拉票', 540, 1560)
    finishPoster()
  }
  qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=' + encodeURIComponent(shareUrl)

  function finishPoster() {
    const dataUrl = canvas.toDataURL('image/png')
    document.getElementById('poster-img').src = dataUrl
    document.getElementById('poster-preview').style.display = 'block'
    document.getElementById('download-btn').style.display = 'block'
    showToast('海报已生成！点击下载按钮保存')
  }
}

function downloadPoster() {
  const img = document.getElementById('poster-img')
  if (!img.src) return
  const a = document.createElement('a')
  a.href = img.src
  a.download = `GLCP_${selectedCP?.name || 'vote'}_${Date.now()}.png`
  a.click()
  showToast('海报下载中...')
}

// ── Share Tracking ──
function copyShareLink() {
  const shareId = 'share_' + deviceFingerprint + '_' + Date.now().toString(36)
  const link = location.origin + location.pathname + '?ref=' + shareId
  navigator.clipboard.writeText(link).then(() => {
    showToast('分享链接已复制！发送给朋友吧 ✨')
    // Track share
    const shares = JSON.parse(localStorage.getItem('glcp_shares') || '[]')
    shares.push({id:shareId, time:Date.now()})
    localStorage.setItem('glcp_shares', JSON.stringify(shares))
  }).catch(() => showToast('复制失败，请手动复制地址栏链接'))
}

// ── Toast ──
function showData() {
  const panel = document.getElementById('data-panel')
  if (panel.style.display === 'block') { panel.style.display = 'none'; return }
  panel.style.display = 'block'

  // Vote data
  const votes = JSON.parse(localStorage.getItem('glcp_votes') || '{}')
  document.getElementById('data-votes').innerHTML = '<strong>📈 票数统计</strong><br>' +
    CP_LIST.map(c => `${c.name}: <strong>${votes[c.id]||c.votes}</strong> 票`).join('<br>')

  // Share data
  const shares = JSON.parse(localStorage.getItem('glcp_shares') || '[]')
  document.getElementById('data-shares').innerHTML = '<strong>📤 分享记录</strong><br>共 ' + shares.length + ' 次分享' +
    (shares.length ? '<br>' + shares.slice(-5).map(s => new Date(s.time).toLocaleString() + ': ' + s.id.slice(0,12)).join('<br>') : '')

  // Ref data
  const refs = JSON.parse(localStorage.getItem('glcp_refs') || '[]')
  document.getElementById('data-refs').innerHTML = '<strong>🔗 引荐来源</strong><br>共 ' + refs.length + ' 个引荐ID' +
    (refs.length ? '<br>最近: ' + refs.slice(-3).join(', ') : '')

  // Device info
  document.getElementById('data-fp').textContent = deviceFingerprint.substring(0, 20) + '...'
  document.getElementById('data-voted').textContent = hasVoted ? '✅ 已投票' : '❌ 未投票'
  document.getElementById('data-myvote').textContent = selectedCP ? selectedCP.name : '—'
  panel.scrollIntoView({behavior:'smooth'})
}

function showToast(msg) {
  const toast = document.getElementById('toast')
  toast.textContent = msg
  toast.classList.add('show')
  clearTimeout(toast._timer)
  toast._timer = setTimeout(() => toast.classList.remove('show'), 2500)
}
</script>
</body>
</html>
