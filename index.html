<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
<title>GL CP 战力排行</title>
<style>
:root{--bg:#fdf2f8;--card:#fff;--text:#1a1a2e;--sub:#6b7280;--pink:#ec4899;--purple:#8b5cf6;--accent:linear-gradient(135deg,#ec4899,#8b5cf6);--border:#f0d5e8;--shadow:0 4px 24px rgba(236,72,153,.08);--radius:20px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(236,72,153,.04) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(139,92,246,.04) 0%,transparent 50%);z-index:-1}
.container{max-width:480px;margin:0 auto;padding:16px}
.header{text-align:center;padding:24px 16px 12px}
.header h1{font-size:26px;font-weight:800;background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px}
.header .sub{font-size:13px;color:var(--sub)}
.cp-card{background:var(--card);border-radius:var(--radius);padding:16px 20px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;border:2px solid transparent;position:relative}
.cp-card.voted{border-color:var(--pink)}
.cp-card .rank{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;background:var(--bg);flex-shrink:0}
.cp-card .rank.top1{width:48px;height:48px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;font-size:26px;box-shadow:0 0 0 3px rgba(251,191,36,.3)}
.cp-card .rank.top2{background:linear-gradient(135deg,#c0c0c0,#9ca3af);color:#fff}
.cp-card .rank.top3{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
.cp-card .info{flex:1;min-width:0}
.cp-card .cp-name{font-size:17px;font-weight:700;margin-bottom:1px}
.cp-card .cp-from{font-size:11px;color:var(--sub)}
.cp-card .gap-badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700;margin-top:4px;line-height:1.5}
.cp-card .gap-badge.leading{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff}
.cp-card .gap-badge.chasing{background:linear-gradient(135deg,#ec4899,#8b5cf6);color:#fff}
.cp-card .votes{text-align:center;min-width:50px}
.cp-card .votes .num{font-size:22px;font-weight:800;background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cp-card .votes .label{font-size:10px;color:var(--sub)}
.vote-btn-sm{background:var(--accent);color:#fff;border:none;padding:6px 14px;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;flex-shrink:0;margin-left:4px}
.vote-btn-sm:hover{opacity:.9;transform:scale(1.05)}
.vote-btn-sm:disabled{opacity:.4;cursor:default;transform:none}
.vote-btn-sm.done{background:#9ca3af}
.comp-banner{background:linear-gradient(135deg,rgba(236,72,153,.1),rgba(139,92,246,.1));border-radius:12px;padding:10px 14px;text-align:center;margin-bottom:14px;font-size:14px;font-weight:600;line-height:1.5}
.comp-banner .hl{color:#ec4899;font-size:18px}
.total-votes{text-align:center;color:var(--sub);font-size:13px;margin:6px 0 14px}
.card-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:200;display:none;justify-content:center;align-items:center;padding:20px}
.card-box{background:#fff;border-radius:24px;padding:24px;max-width:340px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.card-box img{width:100%;border-radius:16px;margin-bottom:12px}
.card-box .dl-btn{background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:99px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:4px}
.card-box .dl-btn:hover{opacity:.9;transform:scale(1.02)}
.card-box .close-btn{background:transparent;color:var(--sub);border:none;padding:10px;font-size:13px;cursor:pointer;margin-top:6px;width:100%}
.footer{text-align:center;padding:20px 16px;color:var(--sub);font-size:12px}
.footer a{color:var(--purple);text-decoration:none}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:100;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>GL CP 战力排行</h1>
    <p class="sub">实时排名 · 每日一票</p>
  </div>

  <div id="comp-banner" class="comp-banner" style="display:none"></div>
  <div class="total-votes" id="total-votes">加载中...</div>
  <div id="cp-list"></div>

  <div class="footer">
    <p>GL CP Vote · <a href="?data" onclick="showData();return false">📊 数据</a></p>
  </div>

  <div id="data-panel" style="display:none;background:var(--card);border-radius:var(--radius);padding:20px;margin-top:16px;box-shadow:var(--shadow)">
    <h3 style="margin-bottom:14px;font-size:15px">📊 数据面板</h3>
    <div style="display:grid;gap:12px;font-size:13px" id="data-supabase-wrap"></div>
    <div style="display:grid;gap:10px;font-size:13px;margin-top:10px">
      <div style="padding:10px;background:var(--bg);border-radius:10px;font-size:12px;color:var(--sub)">
        <p>设备: <code id="data-fp"></code></p>
        <p>状态: <span id="data-voted"></span></p>
        <p>投给了: <span id="data-myvote"></span></p>
        <p style="margin-top:6px" id="data-hint"></p>
      </div>
    </div>
  </div>
</div>

<div class="card-overlay" id="card-overlay" onclick="if(event.target===this)closeCard()">
  <div class="card-box">
    <img id="card-img" alt="战力卡">
    <button class="dl-btn" id="card-dl-btn" onclick="downloadCard()">⬇️ 保存战力卡</button>
    <p style="font-size:11px;color:var(--sub);margin-top:6px">长按图片也可以保存</p>
    <button class="close-btn" onclick="closeCard()">关闭</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ Config ═══
const SUPABASE_URL = 'https://oefzzmflkdoigfahbskc.supabase.co'
const SUPABASE_KEY = 'sb_publishable_R3EGbB23qba66lweHNbLjQ_gzxxVnqB'
function supabaseAPI(path, opts = {}) {
  return fetch(SUPABASE_URL + '/rest/v1/' + path, { ...opts, headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, ...(opts.headers||{}) } }).then(r => r.json()).catch(() => null)
}

const CP_LIST = [
  {id:1, name:'忧城 × 千景', from:'《恋语轻唱》', votes:0, color:'#a78bfa'},
  {id:2, name:'小糸侑 × 七海灯子', from:'《终将成为你》', votes:0, color:'#60a5fa'},
  {id:3, name:'安达 × 岛村', from:'《安达与岛村》', votes:0, color:'#f472b6'},
  {id:4, name:'LingLing × Orm', from:'《我们的秘密》', votes:0, color:'#fbbf24'},
  {id:5, name:'Freen × Becky', from:'《粉红理论》', votes:0, color:'#fb923c'},
  {id:6, name:'Milk × Love', from:'《地球倾斜23.5度》', votes:0, color:'#34d399'},
  {id:7, name:'Faye × Yoko', from:'《爱填满空白》', votes:0, color:'#e879f9'},
  {id:8, name:'Namtan × Film', from:'《冥王星》', votes:0, color:'#38bdf8'},
  {id:9, name:'席娜 × 美美', from:'《与妳相恋到生命尽头》', votes:0, color:'#f87171'},
  {id:10, name:'甘露寺蜜璃 × 胡蝶忍', from:'《鬼灭之刃》', votes:0, color:'#fb7185'},
]

let hasVoted = false
let deviceFingerprint = ''
let isAdmin = location.search.includes('admin')

// ═══ Init ═══
async function init() {
  deviceFingerprint = getFingerprint()
  await loadVotes()
  render()
}
init()

function getFingerprint() {
  const stored = localStorage.getItem('glcp_fp')
  if (!stored) {
    const fpId = 'fp_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36)
    localStorage.setItem('glcp_fp', fpId)
    return fpId
  }
  return stored
}

// ═══ Data ═══
async function loadVotes() {
  try {
    let all = [], off = 0
    while (true) {
      const b = await supabaseAPI('votes?select=cp_id,voter_fingerprint,created_at&limit=1000&offset=' + off)
      if (!b || !b.length) break
      all = all.concat(b)
      if (b.length < 1000) break
      off += 1000
    }
    const counts = {}
    all.forEach(r => {
      if (r.voter_fingerprint && r.voter_fingerprint.startsWith('seed_')) return
      const cid = parseInt(r.cp_id); counts[cid] = (counts[cid] || 0) + 1
    })
    CP_LIST.forEach(cp => { cp.votes = counts[cp.id] || 0 })

    const my = all.filter(r => r.voter_fingerprint === deviceFingerprint)
    if (my.length) {
      my.sort((a,b) => new Date(b.created_at) - new Date(a.created_at))
      if (Date.now() < new Date(my[0].created_at).getTime() + 86400000) hasVoted = true
    }
  } catch(e) {
    const stored = JSON.parse(localStorage.getItem('glcp_votes') || '{}')
    CP_LIST.forEach(cp => { cp.votes = stored[cp.id] || 0 })
    hasVoted = !!localStorage.getItem('glcp_voted_' + deviceFingerprint)
  }
}

// ═══ Render ═══
function render() {
  const sorted = [...CP_LIST].sort((a,b) => b.votes - a.votes)
  const total = sorted.reduce((s,c) => s + c.votes, 0)
  const max = sorted[0]?.votes || 1

  document.getElementById('total-votes').textContent = (total > 0 ? `共 ${total} 票 · ` : '') + `${CP_LIST.length} 对CP参赛`

  // 竞争条
  const banner = document.getElementById('comp-banner')
  if (sorted[0] && sorted[1]) {
    const gap = sorted[0].votes - sorted[1].votes
    if (gap > 0) banner.innerHTML = '🔥 <span class="hl">' + sorted[0].name.split('×')[0] + '</span> 领先 <span class="hl">' + sorted[1].name.split('×')[0] + '</span> <span class="hl">' + gap + '</span> 票'
    else banner.innerHTML = '🔥 <span class="hl">' + sorted[0].name.split('×')[0] + '</span> 与 <span class="hl">' + sorted[1].name.split('×')[0] + '</span> 胶着！'
    banner.style.display = 'block'
  } else banner.style.display = 'none'

  document.getElementById('cp-list').innerHTML = sorted.map((cp, i) => {
    const gap = i > 0 ? sorted[i-1].votes - cp.votes : 0
    const isFirst = i === 0
    const badgeClass = isFirst ? 'gap-badge leading' : 'gap-badge chasing'
    const badgeText = isFirst ? (gap > 0 ? '🏆 领先 ' + gap + ' 票' : '🏆 第1') : '🔺 差 ' + gap + ' 票可反超'
    const btnDisabled = hasVoted && !isAdmin
    const btnText = btnDisabled ? '已投' : (isFirst ? '保持第1' : '差' + gap + '反超')
    const btnClass = btnDisabled ? 'vote-btn-sm done' : 'vote-btn-sm'
    return `<div class="cp-card ${cp.id === lastVotedCpId ? 'voted' : ''}">
      <div class="rank ${i<3?'top'+(i+1):''}">${i === 0 ? '👑' : (i+1)}</div>
      <div class="info">
        <div class="cp-name">${cp.name}</div>
        <div class="cp-from">${cp.from}</div>
        <div class="${badgeClass}">${badgeText}</div>
      </div>
      <div class="votes">
        <div class="num">${cp.votes}</div>
        <div class="label">票</div>
      </div>
      <button class="${btnClass}" onclick="vote(${cp.id})" ${btnDisabled ? 'disabled' : ''}>${btnText}</button>
    </div>`
  }).join('')
}

// ═══ Vote ═══
let lastVotedCpId = null

async function vote(cpId) {
  if (hasVoted && !isAdmin) { showToast('每天限投1票，明天再来！'); return }
  const cp = CP_LIST.find(c => c.id === cpId)
  if (!cp) return
  cp.votes++
  hasVoted = true
  lastVotedCpId = cpId
  localStorage.setItem('glcp_voted_' + deviceFingerprint, '1')
  localStorage.setItem('glcp_myvote', String(cpId))

  const fp = isAdmin ? 'seed_admin_' + deviceFingerprint : deviceFingerprint
  fetch(SUPABASE_URL + '/rest/v1/votes', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ cp_id: cpId, voter_fingerprint: fp })
  }).catch(() => {})

  render()
  showCard(cp)
}

// ═══ 战力卡 ═══
let lastCardUrl = ''

function showCard(cp) {
  const w = 700, h = 1000
  const canvas = document.createElement('canvas')
  canvas.width = w; canvas.height = h
  const ctx = canvas.getContext('2d')

  // 背景渐变
  const grad = ctx.createLinearGradient(0, 0, w, h)
  grad.addColorStop(0, cp.color + 'cc'); grad.addColorStop(0.5, '#fff'); grad.addColorStop(1, cp.color + '88')
  ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h)

  // CP名
  ctx.textAlign = 'center'
  const parts = cp.name.split('×')
  ctx.fillStyle = '#1a1a2e'
  if (parts.length === 2) {
    ctx.font = 'bold 64px system-ui,sans-serif'; ctx.fillText(parts[0].trim(), w/2, 200)
    ctx.font = '36px system-ui,sans-serif'; ctx.fillStyle = '#9ca3af'; ctx.fillText('×', w/2, 280)
    ctx.font = 'bold 64px system-ui,sans-serif'; ctx.fillStyle = '#1a1a2e'; ctx.fillText(parts[1].trim(), w/2, 360)
  } else {
    ctx.font = 'bold 72px system-ui,sans-serif'; ctx.fillText(cp.name, w/2, 280)
  }

  // 出处
  ctx.font = '28px system-ui,sans-serif'; ctx.fillStyle = '#6b7280'
  ctx.fillText(cp.from, w/2, 440)

  // 票数（大号）
  const rank = [...CP_LIST].sort((a,b) => b.votes - a.votes).findIndex(c => c.id === cp.id) + 1
  ctx.font = 'bold 140px system-ui,sans-serif'
  ctx.fillStyle = cp.color
  ctx.fillText(cp.votes + ' 票', w/2, 620)

  // 排名
  ctx.font = 'bold 48px system-ui,sans-serif'
  ctx.fillStyle = cp.color
  const total = CP_LIST.reduce((s,c) => s + c.votes, 0)
  ctx.fillText('第 ' + rank + ' 名', w/2, 710)

  // 差距
  const sorted = [...CP_LIST].sort((a,b) => b.votes - a.votes)
  const gap = rank > 1 ? sorted[rank-2].votes - cp.votes : sorted[0].votes - (sorted[1]?.votes || 0)
  ctx.font = '32px system-ui,sans-serif'
  ctx.fillStyle = '#6b7280'
  if (rank === 1 && gap > 0) ctx.fillText('领先 第2名 ' + gap + ' 票', w/2, 780)
  else if (rank === 1) ctx.fillText('断层第一！', w/2, 780)
  else ctx.fillText('差 ' + gap + ' 票反超 ' + sorted[rank-2].name.split('×')[0].trim(), w/2, 780)

  // 底部水印
  ctx.font = '18px system-ui,sans-serif'; ctx.fillStyle = '#c0c0c0'
  ctx.fillText('GL CP Vote · yang0000wu.github.io/gl-cp-vote', w/2, h - 40)

  lastCardUrl = canvas.toDataURL('image/png')
  document.getElementById('card-img').src = lastCardUrl
  document.getElementById('card-overlay').style.display = 'flex'
  showToast('投票成功！🎉')
}

function downloadCard() {
  if (!lastCardUrl) return
  const a = document.createElement('a')
  a.href = lastCardUrl
  a.download = 'CP_' + Date.now() + '.png'
  a.click()
}

function closeCard() {
  document.getElementById('card-overlay').style.display = 'none'
}

// ═══ Admin Panel ═══
function showData() {
  const panel = document.getElementById('data-panel')
  if (panel.style.display === 'block') { panel.style.display = 'none'; return }
  panel.style.display = 'block'
  document.getElementById('data-fp').textContent = deviceFingerprint.substring(0, 20) + '...'
  document.getElementById('data-voted').textContent = hasVoted ? '已投票' : '未投票'
  document.getElementById('data-myvote').textContent = lastVotedCpId ? (CP_LIST.find(c => c.id === lastVotedCpId)?.name || '—') : '—'
  if (isAdmin) {
    document.getElementById('data-hint').textContent = '管理员模式：服务器真实数据'
    loadSupabaseStats()
  } else {
    document.getElementById('data-hint').textContent = '仅管理员可见'
    document.getElementById('data-supabase-wrap').innerHTML = ''
  }
  panel.scrollIntoView({behavior:'smooth'})
}

async function loadSupabaseStats() {
  const wrap = document.getElementById('data-supabase-wrap')
  try {
    let all = [], off = 0
    while (true) {
      const batch = await fetch(SUPABASE_URL + '/rest/v1/votes?select=cp_id,voter_fingerprint,created_at,referred_by,source&limit=1000&offset=' + off, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      }).then(r => r.json()).catch(() => [])
      if (!batch || !batch.length) break
      all = all.concat(batch); if (batch.length < 1000) break; off += 1000
    }
    const counts = {}, seedCount = {}
    all.forEach(r => { counts[r.cp_id] = (counts[r.cp_id] || 0) + 1; if (r.voter_fingerprint?.startsWith('seed_')) seedCount[r.cp_id] = (seedCount[r.cp_id] || 0) + 1 })
    const realVotes = all.length - Object.values(seedCount).reduce((a,b) => a+b, 0)
    let html = '<div style="padding:12px;background:rgba(139,92,246,.06);border-radius:12px;border:1px solid rgba(139,92,246,.15)">'
    html += '<strong>总票数：' + all.length + '</strong> · 真实投票：<strong style="color:#ec4899">' + realVotes + '</strong> 票<br>'
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 14px;margin-top:6px;font-size:12px">'
    CP_LIST.sort((a,b) => (counts[b.id]||0) - (counts[a.id]||0)).forEach(cp => {
      const c = counts[cp.id] || 0; const s = Math.max(0, c - (seedCount[cp.id] || 0))
      html += '<div>' + cp.name.split('×')[0] + '</div><div style="text-align:right"><strong>' + c + '</strong>' + (s > 0 ? ' <span style="color:#ec4899;font-size:10px">(+' + s + ')</span>' : '') + '</div>'
    })
    html += '</div><div style="margin-top:4px;font-size:11px;color:var(--sub)">种子票 ≈ ' + (all.length - realVotes) + ' · 真实票 ≈ ' + realVotes + '</div></div>'

    const recent = all.filter(r => !r.voter_fingerprint?.startsWith('seed_')).sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 20)
    if (recent.length) {
      html += '<div style="margin-top:12px;padding:12px;background:var(--bg);border-radius:12px"><strong style="font-size:13px">最近 ' + recent.length + ' 条投票</strong>'
      html += '<div style="margin-top:6px;font-size:11px;display:grid;gap:2px">'
      recent.forEach(r => {
        const cp = CP_LIST.find(c => c.id === parseInt(r.cp_id))
        const t = new Date(r.created_at).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})
        html += '<div style="display:grid;grid-template-columns:36px 1fr 40px;gap:4px;padding:2px 0">'
        html += '<span>' + t + '</span><span>' + (cp ? cp.name.split('×')[0] : 'CP#' + r.cp_id) + '</span>'
        html += '<span style="color:var(--sub)">' + (r.source ? r.source : '直接') + '</span></div>'
      })
      html += '</div></div>'
    }
    wrap.innerHTML = html
  } catch(e) {
    wrap.innerHTML = '<div style="padding:12px;background:var(--bg);border-radius:12px;color:var(--sub);font-size:12px">加载失败</div>'
  }
}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2200)
}
</script>
</body>
</html>
