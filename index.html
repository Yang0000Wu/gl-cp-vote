<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
<title>GL CP 投票PK · 为你最爱的CP打call</title>
<style>
:root{--bg:#fdf2f8;--card:#fff;--text:#1a1a2e;--sub:#6b7280;--pink:#ec4899;--purple:#8b5cf6;--accent:linear-gradient(135deg,#ec4899,#8b5cf6);--border:#f0d5e8;--shadow:0 4px 24px rgba(236,72,153,.08);--radius:20px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;line-height:1.6;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(236,72,153,.04) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(139,92,246,.04) 0%,transparent 50%);z-index:-1}
.container{max-width:480px;margin:0 auto;padding:16px}
.header{text-align:center;padding:28px 16px 16px}
.header h1{font-size:28px;font-weight:800;background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.header .sub{font-size:14px;color:var(--sub)}
.tabs{display:flex;gap:8px;margin-bottom:20px;background:var(--card);border-radius:var(--radius);padding:4px;box-shadow:var(--shadow)}
.tab{flex:1;text-align:center;padding:12px;border-radius:16px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;border:none;background:transparent;color:var(--sub)}
.tab.active{background:var(--accent);color:#fff}
.section{display:none}
.section.active{display:block}
.cp-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;cursor:pointer;transition:.15s;border:2px solid transparent;position:relative}
.cp-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(236,72,153,.12)}
.cp-card.voted{border-color:var(--pink)}
.cp-card .rank{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;background:var(--bg);flex-shrink:0}
.cp-card .rank.top1{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;font-size:22px}
.cp-card .rank.top2{background:linear-gradient(135deg,#c0c0c0,#9ca3af);color:#fff}
.cp-card .rank.top3{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
.cp-card .info{flex:1;min-width:0}
.cp-card .cp-name{font-size:18px;font-weight:700;margin-bottom:2px}
.cp-card .cp-from{font-size:12px;color:var(--sub)}
.cp-card .votes{text-align:center;flex-shrink:0}
.cp-card .votes .num{font-size:24px;font-weight:800;background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cp-card .votes .label{font-size:11px;color:var(--sub)}
.cp-card .voted-mark{position:absolute;top:10px;right:14px;font-size:12px;color:var(--pink);font-weight:600}
.vote-btn{background:var(--accent);color:#fff;border:none;padding:12px 28px;border-radius:99px;font-size:16px;font-weight:700;cursor:pointer;display:block;width:100%;max-width:300px;margin:24px auto;transition:.15s}
.vote-btn:hover{opacity:.9;transform:scale(1.02)}
.vote-btn:disabled{opacity:.4;cursor:default;transform:none}
.poster-area{text-align:center;padding:20px 0}
.poster-preview{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);display:none;margin:16px 0}
.poster-preview img{width:100%;display:block}
.result-bar{height:8px;border-radius:4px;background:var(--border);margin-top:8px;overflow:hidden}
.result-bar .fill{height:100%;border-radius:4px;background:var(--accent);transition:width .5s}
.total-votes{text-align:center;color:var(--sub);font-size:13px;margin:8px 0 16px}
.ref-badge{text-align:center;font-size:13px;color:var(--purple);font-weight:600;margin:8px 0;display:none}
.footer{text-align:center;padding:24px 16px;color:var(--sub);font-size:12px}
.footer a{color:var(--purple);text-decoration:none}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:99px;font-size:14px;font-weight:600;z-index:100;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
@keyframes heartBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.3)}30%{transform:scale(1)}45%{transform:scale(1.2)}}
.heart{animation:heartBeat 1.5s infinite;display:inline-block}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>GL CP 投票PK</h1>
    <p class="sub">为你最爱的CP投上一票，生成专属海报分享打call</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('vote')">投票</button>
    <button class="tab" onclick="switchTab('results')">排行</button>
  </div>

  <div id="ref-badge" class="ref-badge">🎯 朋友邀请你来投票</div>

  <div id="vote-section" class="section active">
    <div id="cp-list"></div>
    <button class="vote-btn" id="vote-submit-btn" disabled onclick="submitVote()">请选择一对CP投票</button>
  </div>

  <div id="results-section" class="section">
    <div class="total-votes" id="total-votes">加载中...</div>
    <div id="results-list"></div>
    <div class="poster-area" id="poster-area">
      <div class="poster-preview" id="poster-preview"><img id="poster-img" alt="拉票海报"></div>
      <button class="vote-btn" id="poster-btn" style="display:none" onclick="generatePoster()">🎨 生成拉票海报</button>
      <button class="vote-btn" id="download-btn" style="display:none" onclick="downloadPoster()">⬇️ 下载海报</button>
    </div>
  </div>

  <div class="footer">
    <p>GL CP Vote · 纯属娱乐 · <a href="?data" onclick="showData();return false">📊 查看数据</a></p>
    <p style="margin-top:4px"><a href="?ref=share_demo" onclick="copyShareLink();return false">📋 复制分享链接</a></p>
  </div>

  <div id="data-panel" style="display:none;background:var(--card);border-radius:var(--radius);padding:24px;margin-top:16px;box-shadow:var(--shadow)">
    <h3 style="margin-bottom:16px">📊 数据面板</h3>
    <div style="display:grid;gap:12px;font-size:14px" id="data-supabase-wrap"></div>
    <div style="display:grid;gap:12px;font-size:14px">
      <div style="padding:12px;background:var(--bg);border-radius:12px;font-size:12px;color:var(--sub)">
        <p>设备指纹: <code id="data-fp"></code></p>
        <p>投票状态: <span id="data-voted"></span></p>
        <p>投给了: <span id="data-myvote"></span></p>
        <p style="margin-top:8px" id="data-hint"></p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// GL CP 投票PK · 纯静态MVP
// ══════════════════════════════════════════

// ── Config ──
const SUPABASE_URL = 'https://oefzzmflkdoigfahbskc.supabase.co'
const SUPABASE_KEY = 'sb_publishable_R3EGbB23qba66lweHNbLjQ_gzxxVnqB'
// 用 fetch 直接调 Supabase REST API，不依赖外部 SDK CDN
function supabaseAPI(path, options = {}) {
  const url = SUPABASE_URL + '/rest/v1/' + path
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    ...(options.headers || {})
  }
  return fetch(url, { ...options, headers }).then(r => r.json()).catch(() => null)
}

// ── CP Data (MVP: hardcoded, P1: user-created) ──
const CP_LIST = [
  {id:1, name:'忧城 × 千景', from:'《恋语轻唱》', votes:0, color:'#a78bfa'},
  {id:2, name:'小糸侑 × 七海灯子', from:'《终将成为你》', votes:0, color:'#60a5fa'},
  {id:3, name:'安达 × 岛村', from:'《安达与岛村》', votes:0, color:'#f472b6'},
  {id:4, name:'LingLing × Orm', from:'《我们的秘密》', votes:0, color:'#fbbf24'},
  {id:5, name:'Freen × Becky', from:'《粉红理论》', votes:0, color:'#fb923c'},
  {id:6, name:'Milk × Love', from:'《地球倾斜23.5度》', votes:0, color:'#34d399'},
  {id:7, name:'Faye × Yoko', from:'《爱填满空白》', votes:0, color:'#e879f9'},
  {id:8, name:'Namtan × Film', from:'《冥王星》', votes:0, color:'#38bdf8'},
  {id:9, name:'席娜 × 美美', from:'《与妳相恋到生命尽头》', votes:0, color:'#f87171'},
]

// ── State ──
let selectedCP = null
let hasVoted = false
let canVoteAgainTime = null  // 可再次投票的时间戳
let deviceFingerprint = ''
let currentTab = 'vote'
let isAdmin = location.search.includes('admin')

// ── Init ──
async function init() {
  deviceFingerprint = getFingerprint()
  checkRef()
  await loadVotes()
  renderCPList()
  renderResults()
}
init()

// ── Device Fingerprint (simple anti-cheat) ──
function getFingerprint() {
  const canvas = document.createElement('canvas')
  const ctx = canvas.getContext('2d')
  ctx.textBaseline = 'top'; ctx.font = '14px Arial'
  ctx.fillText('GLCPVote', 2, 2)
  const fp = canvas.toDataURL()
  const stored = localStorage.getItem('glcp_fp')
  if (!stored) {
    const fpId = 'fp_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36)
    localStorage.setItem('glcp_fp', fpId)
    return fpId
  }
  return stored
}

// ── Check Referral ──
function checkRef() {
  const params = new URLSearchParams(location.search)
  const ref = params.get('ref')
  if (ref) {
    document.getElementById('ref-badge').style.display = 'block'
    localStorage.setItem('glcp_referrer', ref)
    const refs = JSON.parse(localStorage.getItem('glcp_refs') || '[]')
    if (!refs.includes(ref)) {
      refs.push(ref)
      localStorage.setItem('glcp_refs', JSON.stringify(refs))
    }
  }
}

// ── Load Votes from Supabase (fallback: localStorage) ──
async function loadVotes() {
  try {
    // 分页拉取所有票
    let allRows = []
    let rangeStart = 0
    while (true) {
      const batch = await supabaseAPI('votes?select=cp_id,voter_fingerprint,created_at&limit=1000&offset=' + rangeStart)
      if (!batch || batch.length === 0) break
      allRows = allRows.concat(batch)
      if (batch.length < 1000) break
      rangeStart += 1000
    }
    if (allRows.length > 0) {
      const counts = {}
      allRows.forEach(row => { const cid = parseInt(row.cp_id); counts[cid] = (counts[cid] || 0) + 1 })
      CP_LIST.forEach(cp => { if (counts[cp.id]) cp.votes = counts[cp.id] })
    }

    // 每日一票：查这个用户最近一次投票
    const myVotes = allRows.filter(r => r.voter_fingerprint === deviceFingerprint)
    if (myVotes.length > 0) {
      // 按时间降序，取最近一条
      myVotes.sort((a,b) => new Date(b.created_at) - new Date(a.created_at))
      const lastVote = new Date(myVotes[0].created_at)
      const nextAllowed = new Date(lastVote.getTime() + 24 * 60 * 60 * 1000)
      if (Date.now() < nextAllowed.getTime()) {
        hasVoted = true
        canVoteAgainTime = nextAllowed.getTime()
        // 记住投了谁
        const lastCp = CP_LIST.find(c => c.id === parseInt(myVotes[0].cp_id))
        if (lastCp) selectedCP = lastCp
        localStorage.setItem('glcp_myvote', String(myVotes[0].cp_id))
      } else {
        hasVoted = false
        canVoteAgainTime = null
      }
    }
  } catch(e) {
    loadFromLocal()
    // 离线兜底：查 localStorage
    hasVoted = !!localStorage.getItem('glcp_voted_' + deviceFingerprint)
    if (hasVoted) {
      selectedCP = CP_LIST.find(c => c.id === parseInt(localStorage.getItem('glcp_myvote') || '0'))
    }
  }

  renderCPList()
  renderResults()
}

function loadFromLocal() {
  const stored = JSON.parse(localStorage.getItem('glcp_votes') || '{}')
  CP_LIST.forEach(cp => { cp.votes = stored[cp.id] || 0 })
}

async function saveVotes(cpId) {
  const cp = CP_LIST.find(c => c.id === cpId)
  if (!cp) return
  fetch(SUPABASE_URL + '/rest/v1/votes', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ cp_id: cpId, voter_fingerprint: deviceFingerprint, referred_by: localStorage.getItem('glcp_referrer') || null })
  }).catch(() => {})
  const data = {}
  CP_LIST.forEach(c => { data[c.id] = c.votes })
  localStorage.setItem('glcp_votes', JSON.stringify(data))
}

// ── Render CP Cards ──
function renderCPList() {
  const sorted = [...CP_LIST].sort((a,b) => b.votes - a.votes)
  const container = document.getElementById('cp-list')
  container.innerHTML = CP_LIST.map((cp, i) => {
    const rank = sorted.findIndex(c => c.id === cp.id) + 1
    const gap = rank > 1 ? sorted[rank-2].votes - cp.votes : 0
    const gapText = rank === 1
      ? (sorted[1] ? '🏆 领先第2名 ' + (sorted[1].votes - cp.votes) + ' 票' : '🏆 断层第一！')
      : '🔺 差' + gap + '票超越前一名'
    return `
    <div class="cp-card ${cp.id === (selectedCP?.id) ? 'voted' : ''}" onclick="selectCP(${cp.id})">
      <div class="rank ${rank<=3?'top'+rank:''}">${rank}</div>
      <div class="info">
        <div class="cp-name">${cp.name}</div>
        <div class="cp-from">${cp.from}</div>
        <div style="font-size:11px;color:var(--sub);margin-top:4px">${gapText}</div>
      </div>
      <div class="votes">
        <div class="num">${cp.votes}</div>
        <div class="label">票</div>
      </div>
      ${cp.id === (selectedCP?.id) ? '<div class="voted-mark">已投票 ✓</div>' : ''}
    </div>
  `}).join('')

  updateVoteButton()
}

function renderResults() {
  const sorted = [...CP_LIST].sort((a, b) => b.votes - a.votes)
  const total = sorted.reduce((s, c) => s + c.votes, 0)
  const max = sorted[0]?.votes || 1

  document.getElementById('total-votes').textContent = `共 ${total} 票 · ${CP_LIST.length} 对CP参赛`
  document.getElementById('results-list').innerHTML = sorted.map((cp, i) => `
    <div class="cp-card" onclick="selectAndVote(${cp.id})">
      <div class="rank ${i<3?'top'+(i+1):''}">${i+1}</div>
      <div class="info" style="flex:1">
        <div class="cp-name">${cp.name}</div>
        <div class="cp-from">${cp.from}</div>
        <div class="result-bar"><div class="fill" style="width:${(cp.votes/max*100).toFixed(1)}%"></div></div>
      </div>
      <div class="votes">
        <div class="num">${cp.votes}</div>
        <div class="label">票 (${((cp.votes/total)*100).toFixed(1)}%)</div>
      </div>
    </div>
  `).join('')

  if (!document.getElementById('referral-leaderboard')) {
    document.getElementById('results-list').insertAdjacentHTML('afterend', '<div id="referral-leaderboard"></div>')
  }
  renderReferralLeaderboard()
}

// ── Vote Logic ──
function selectCP(id) {
  if (hasVoted) {
    showToast('你已经投过票了，快去生成海报吧！')
    return
  }
  selectedCP = CP_LIST.find(c => c.id === id)
  renderCPList()
}

function selectAndVote(id) {
  if (!hasVoted) {
    selectCP(id)
    submitVote()
  }
}

function updateVoteButton() {
  const btn = document.getElementById('vote-submit-btn')
  if (hasVoted) {
    btn.textContent = '✅ 已投票 · 去看看排行'
    btn.disabled = false
    btn.onclick = () => switchTab('results')
  } else if (selectedCP) {
    btn.textContent = `为「${selectedCP.name}」投票！`
    btn.disabled = false
  } else {
    btn.textContent = '请选择一对CP投票'
    btn.disabled = true
  }
}

async function submitVote() {
  if (!selectedCP || hasVoted) {
    if (hasVoted) switchTab('results')
    return
  }
  selectedCP.votes++
  hasVoted = true
  localStorage.setItem('glcp_voted_' + deviceFingerprint, '1')
  localStorage.setItem('glcp_myvote', String(selectedCP.id))

  // 引荐追踪：记录是谁拉来的票
  const referrer = localStorage.getItem('glcp_referrer')
  if (referrer) {
    const impact = JSON.parse(localStorage.getItem('glcp_impact') || '{}')
    impact[referrer] = (impact[referrer] || 0) + 1
    localStorage.setItem('glcp_impact', JSON.stringify(impact))
  }

  await saveVotes(selectedCP.id)
  renderCPList()
  renderResults()
  updateVoteButton()

  // 钩子：投票完成后展示个性化的拉票激励
  const rank = [...CP_LIST].sort((a,b) => b.votes - a.votes).findIndex(c => c.id === selectedCP.id) + 1
  const behind = rank > 1 ? [...CP_LIST].sort((a,b) => b.votes - a.votes)[rank - 2].votes - selectedCP.votes : 0
  let hookMsg = '投票成功！🎉 '
  if (rank === 1) hookMsg += 'TA是第1名！生成海报号召更多人来投票，守住冠军！'
  else hookMsg += 'TA排第' + rank + '名，只差' + behind + '票就能超过前一名！快来拉票！'
  showToast(hookMsg)

  setTimeout(() => {
    switchTab('results')
    document.getElementById('poster-btn').style.display = 'block'
    updateVoterDashboard()
  }, 800)
}

function updateVoterDashboard() {
  if (!hasVoted || !selectedCP) return
  const area = document.getElementById('poster-area')
  const refId = 'share_' + deviceFingerprint
  const impact = JSON.parse(localStorage.getItem('glcp_impact') || '{}')
  const myImpact = impact[refId] || 0

  let dashHtml = '<div style="background:linear-gradient(135deg,rgba(236,72,153,.06),rgba(139,92,246,.06));border-radius:16px;padding:20px;margin-bottom:16px;text-align:center">'
  dashHtml += '<p style="font-size:14px;margin-bottom:4px">💜 你为 <strong>' + selectedCP.name + '</strong> 投了 1 票</p>'
  if (myImpact > 0) {
    dashHtml += '<p style="font-size:18px;font-weight:800;background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">你已为TA拉了 <span style="font-size:28px">' + myImpact + '</span> 票！</p>'
  } else {
    dashHtml += '<p style="font-size:13px;color:var(--sub)">还没拉票？分享海报，每一票都算你的！</p>'
  }
  dashHtml += '<p style="font-size:12px;color:var(--sub);margin-top:8px">📋 分享链接带你的专属追踪码，朋友投了自动计入你的拉票数</p>'
  dashHtml += '</div>'

  const existing = document.getElementById('voter-dashboard')
  if (existing) existing.remove()
  const dash = document.createElement('div')
  dash.id = 'voter-dashboard'
  dash.innerHTML = dashHtml
  area.insertBefore(dash, area.firstChild)
}

// ── Tab Switching ──
function switchTab(tab) {
  currentTab = tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
  if (tab === 'vote') {
    document.querySelector('.tab:first-child').classList.add('active')
    document.getElementById('vote-section').classList.add('active')
  } else {
    document.querySelector('.tab:last-child').classList.add('active')
    document.getElementById('results-section').classList.add('active')
    renderResults()
    if (hasVoted) {
      document.getElementById('poster-btn').style.display = 'block'
    }
  }
}

// ── Poster Generation ──
function generatePoster() {
  if (!selectedCP) { showToast('请先投票'); return }
  const canvas = document.createElement('canvas')
  canvas.width = 1080; canvas.height = 1920
  const ctx = canvas.getContext('2d')

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, 1920)
  bg.addColorStop(0, '#fdf2f8'); bg.addColorStop(0.4, '#ffffff'); bg.addColorStop(0.7, '#ffffff'); bg.addColorStop(1, '#fdf2f8')
  ctx.fillStyle = bg; ctx.fillRect(0, 0, 1080, 1920)

  // Decorative circles
  ctx.fillStyle = 'rgba(236,72,153,0.04)'; ctx.beginPath(); ctx.arc(200, 300, 400, 0, Math.PI*2); ctx.fill()
  ctx.fillStyle = 'rgba(139,92,246,0.04)'; ctx.beginPath(); ctx.arc(880, 1600, 500, 0, Math.PI*2); ctx.fill()

  // Title
  ctx.fillStyle = '#8b5cf6'; ctx.font = 'bold 32px system-ui,sans-serif'; ctx.textAlign = 'center'
  ctx.fillText('💜 GL CP 投票PK 💜', 540, 140)

  // CP name
  ctx.font = 'bold 90px system-ui,sans-serif'
  const grad = ctx.createLinearGradient(0, 300, 1080, 300)
  grad.addColorStop(0, '#ec4899'); grad.addColorStop(1, '#8b5cf6')
  ctx.fillStyle = grad
  const nameParts = selectedCP.name.split('×').join(' × ')
  ctx.fillText(nameParts, 540, 420)

  // From
  ctx.fillStyle = '#9ca3af'; ctx.font = '38px system-ui,sans-serif'
  ctx.fillText(selectedCP.from, 540, 520)

  // Votes
  ctx.fillStyle = grad; ctx.font = 'bold 200px system-ui,sans-serif'
  ctx.fillText(selectedCP.votes + ' 票', 540, 800)

  // Ranking
  const rank = [...CP_LIST].sort((a,b) => b.votes - a.votes).findIndex(c => c.id === selectedCP.id) + 1
  const total = CP_LIST.reduce((s,c) => s + c.votes, 0)
  ctx.fillStyle = '#6b7280'; ctx.font = '36px system-ui,sans-serif'
  ctx.fillText('第 ' + rank + ' 名 · 占比 ' + ((selectedCP.votes/total)*100).toFixed(1) + '%', 540, 920)

  const shareUrl = getShareUrl()

  // Load QR code from API, draw when ready
  const qrImg = new Image()
  qrImg.crossOrigin = 'anonymous'
  qrImg.onload = function() {
    ctx.fillStyle = '#fff'; ctx.fillRect(380, 1060, 320, 320)
    ctx.drawImage(qrImg, 380, 1060, 320, 320)
    ctx.fillStyle = '#6b7280'; ctx.font = '24px system-ui,sans-serif'; ctx.textAlign = 'center'
    ctx.fillText('扫码投票支持 ' + selectedCP.name, 540, 1430)
    ctx.fillStyle = '#c0c0c0'; ctx.font = '20px system-ui,sans-serif'
    ctx.fillText(shareUrl, 540, 1480)
    ctx.fillStyle = '#d1d5db'; ctx.font = '24px system-ui,sans-serif'
    ctx.fillText('长按保存海报 · 分享到朋友圈为CP拉票', 540, 1560)
    finishPoster()
  }
  qrImg.onerror = function() {
    ctx.fillStyle = '#6b7280'; ctx.font = '28px system-ui,sans-serif'; ctx.textAlign = 'center'
    ctx.fillText('扫描二维码或访问链接投票', 540, 1300)
    ctx.fillStyle = '#c0c0c0'; ctx.font = '22px system-ui,sans-serif'
    ctx.fillText(shareUrl, 540, 1380)
    ctx.fillStyle = '#d1d5db'; ctx.font = '24px system-ui,sans-serif'
    ctx.fillText('长按保存海报 · 分享到朋友圈为CP拉票', 540, 1560)
    finishPoster()
  }
  qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=' + encodeURIComponent(shareUrl)

  function finishPoster() {
    const dataUrl = canvas.toDataURL('image/png')
    document.getElementById('poster-img').src = dataUrl
    document.getElementById('poster-preview').style.display = 'block'
    document.getElementById('download-btn').style.display = 'block'
    showToast('海报已生成！点击下载按钮保存')
  }
}

function downloadPoster() {
  const img = document.getElementById('poster-img')
  if (!img.src) return
  const a = document.createElement('a')
  a.href = img.src
  a.download = `GLCP_${selectedCP?.name || 'vote'}_${Date.now()}.png`
  a.click()
  showToast('海报下载中...')
}

// ── Share Tracking ──
function copyShareLink() {
  const shareId = 'share_' + deviceFingerprint
  const link = location.origin + location.pathname + '?ref=' + shareId
  navigator.clipboard.writeText(link).then(() => {
    showToast('🔗 专属拉票链接已复制！别人通过这个链接投票，都会算作你拉的票 ✨')
    const shares = JSON.parse(localStorage.getItem('glcp_shares') || '[]')
    shares.push({id:shareId, time:Date.now(), cp: selectedCP?.id || 0})
    localStorage.setItem('glcp_shares', JSON.stringify(shares))
  }).catch(() => showToast('复制失败，请手动复制地址栏链接'))
}

// 生成海报时用专属链接
function getShareUrl() {
  return location.origin + location.pathname + '?ref=share_' + deviceFingerprint
}

// ── Toast ──
function showData() {
  const panel = document.getElementById('data-panel')
  if (panel.style.display === 'block') { panel.style.display = 'none'; return }
  panel.style.display = 'block'

  const hint = document.getElementById('data-hint')
  document.getElementById('data-fp').textContent = deviceFingerprint.substring(0, 20) + '...'
  document.getElementById('data-voted').textContent = hasVoted ? '✅ 已投票' : '❌ 未投票'
  document.getElementById('data-myvote').textContent = selectedCP ? selectedCP.name : '—'

  if (isAdmin) {
    hint.textContent = '🔐 管理员模式：服务器真实数据已显示'
    loadSupabaseStats()
  } else {
    hint.textContent = '💡 投票数据跨设备同步。详细数据仅管理员可见。'
    document.getElementById('data-supabase-wrap').innerHTML = ''
  }

  panel.scrollIntoView({behavior:'smooth'})
}

async function loadSupabaseStats() {
  const wrap = document.getElementById('data-supabase-wrap')
  try {
    const countR = await fetch(SUPABASE_URL + '/rest/v1/votes?select=cp_id&limit=1', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Prefer': 'count=exact' }
    })
    const range = countR.headers.get('content-range')
    const totalVotes = range ? parseInt(range.split('/')[1]) : 0

    let allRows = [], offset = 0
    while (true) {
      const batch = await fetch(SUPABASE_URL + '/rest/v1/votes?select=cp_id,voter_fingerprint&limit=1000&offset=' + offset, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      }).then(r => r.json()).catch(() => [])
      if (!batch || batch.length === 0) break
      allRows = allRows.concat(batch)
      if (batch.length < 1000) break
      offset += 1000
    }

    const counts = {}, seedCount = {}
    allRows.forEach(r => {
      counts[r.cp_id] = (counts[r.cp_id] || 0) + 1
      if (r.voter_fingerprint && r.voter_fingerprint.startsWith('seed_')) seedCount[r.cp_id] = (seedCount[r.cp_id] || 0) + 1
    })

    const realVotes = totalVotes - Object.values(seedCount).reduce((a,b) => a+b, 0)

    let html = '<div style="padding:12px;background:rgba(139,92,246,.06);border-radius:12px;border:1px solid rgba(139,92,246,.15)">'
    html += '<strong>🌐 服务器总票数：' + totalVotes + '</strong>'
    html += ' · 真实投票：<strong style="color:#ec4899">' + realVotes + '</strong> 票<br>'
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 16px;margin-top:6px;font-size:13px">'
    CP_LIST.sort((a,b) => (counts[b.id]||0) - (counts[a.id]||0)).forEach((cp, i) => {
      const c = counts[cp.id] || 0
      const s = Math.max(0, c - (seedCount[cp.id] || 0))
      html += '<div>' + (i+1) + '. ' + cp.name + '</div>'
      html += '<div style="text-align:right"><strong>' + c + '</strong> 票' + (s > 0 ? ' <span style="color:#ec4899;font-size:11px">(+' + s + ')</span>' : '') + '</div>'
    })
    html += '</div>'
    html += '<div style="margin-top:6px;font-size:12px;color:var(--sub)">种子票 ≈ ' + (totalVotes - realVotes) + ' · 真实票 ≈ ' + realVotes + ' · 剩余可显示行数 = 不限制</div>'
    html += '</div>'
    wrap.innerHTML = html
  } catch(e) {
    wrap.innerHTML = '<div style="padding:12px;background:var(--bg);border-radius:12px;color:var(--sub)">服务器数据加载失败</div>'
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast')
  toast.textContent = msg
  toast.classList.add('show')
  clearTimeout(toast._timer)
  toast._timer = setTimeout(() => toast.classList.remove('show'), 2500)
}

// ── 拉票力排行榜 ──
async function renderReferralLeaderboard() {
  const wrap = document.getElementById('referral-leaderboard')
  if (!wrap) return
  try {
    let allRows = [], offset = 0
    while (true) {
      const batch = await supabaseAPI('votes?select=referred_by,voter_fingerprint&limit=1000&offset=' + offset)
      if (!batch || batch.length === 0) break
      allRows = allRows.concat(batch)
      if (batch.length < 1000) break
      offset += 1000
    }

    const refCounts = {}
    allRows.forEach(r => {
      if (r.referred_by && !r.voter_fingerprint?.startsWith('seed_')) {
        refCounts[r.referred_by] = (refCounts[r.referred_by] || 0) + 1
      }
    })

    // 如果真实数据不足，用模拟数据填充排行榜（启动社交证明）
    const minEntries = 5
    const demoReferrers = [
      { id:'demo_lingorm_top', label:'LingOrm 应援团', count:12 },
      { id:'demo_freenbecky', label:'FB 粉丝后援会', count:9 },
      { id:'demo_anadashima', label:'安达岛村应援部', count:7 },
      { id:'demo_milklove', label:'MilkLove  CP 推', count:5 },
      { id:'demo_namtanfilm', label:'NamtanFilm 激推', count:3 },
    ]
    const myRefId = 'share_' + deviceFingerprint
    const myServerCount = refCounts[myRefId] || 0

    // 合并：真实数据 + demo 数据（demo 不计入真实票）
    const merged = { ...refCounts }
    if (Object.keys(refCounts).filter(k => !k.startsWith('demo_')).length < minEntries) {
      demoReferrers.forEach(d => { if (!merged[d.id]) merged[d.id] = d.count })
    }

    const sorted = Object.entries(merged)
      .filter(([k]) => k.startsWith('share_') || k.startsWith('demo_'))
      .sort((a,b) => b[1] - a[1])

    let html = '<div style="margin-top:20px">'
    html += '<h3 style="font-size:16px;margin-bottom:12px">🏆 拉票力排行榜</h3>'
    html += '<p style="font-size:12px;color:var(--sub);margin-bottom:12px">分享链接拉人来投票，排名上升！拉得越多排名越高 👇</p>'

    if (sorted.length === 0) {
      html += '<p style="color:var(--sub);font-size:13px">暂无拉票数据。快去分享拉票吧！</p>'
    } else {
      html += '<div style="display:grid;gap:8px">'
      sorted.slice(0, 10).forEach(([refId, count], i) => {
        const isMine = refId === myRefId
        const isDemo = refId.startsWith('demo_')
        const demoLabel = demoReferrers.find(d => d.id === refId)?.label || ''
        const displayName = isMine ? '👈 你' : (isDemo ? demoLabel : '拉票人 #' + refId.substring(6, 14))
        const showBadge = isDemo ? 'style="font-size:11px;color:var(--sub)"' : ''
        html += '<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg);border-radius:12px;' + (isMine ? 'border:1px solid var(--pink)' : '') + '">'
        html += '<span style="font-weight:700;font-size:14px;color:var(--sub);width:24px">' + (i+1) + '</span>'
        html += '<span style="flex:1;font-size:14px">' + displayName + '</span>'
        html += '<span style="font-weight:700;color:var(--purple)">' + count + ' 票</span>'
        html += '</div>'
      })
      html += '</div>'

      // 没上榜的用户显示差距激励
      if (!sorted.some(([k]) => k === myRefId) && sorted.length > 0) {
        const lastOnBoard = sorted[Math.min(sorted.length - 1, 9)][1]
        const gap = lastOnBoard - myServerCount + 1
        if (gap > 0 && myServerCount === 0) {
          html += '<div style="margin-top:12px;padding:12px 14px;background:linear-gradient(135deg,rgba(236,72,153,.08),rgba(139,92,246,.08));border-radius:12px;text-align:center">'
          html += '<p style="font-size:14px;font-weight:600;color:var(--text)">你差 <span style="color:var(--pink);font-size:20px">' + gap + '</span> 票就能上榜！快来拉票 👆</p>'
          html += '</div>'
        }
      }
    }
    html += '</div>'
    wrap.innerHTML = html
  } catch(e) {
    wrap.innerHTML = '<div style="margin-top:20px;padding:12px;background:var(--bg);border-radius:12px;color:var(--sub);font-size:13px">拉票排行榜加载中...</div>'
  }
}
</script>
