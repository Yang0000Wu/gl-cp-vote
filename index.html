<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
<title>GL CP 竞技场 · 投票赛</title>
<style>
:root{--bg:#fdf2f8;--card:#fff;--text:#1a1a2e;--sub:#6b7280;--pink:#ec4899;--purple:#8b5cf6;--accent:linear-gradient(135deg,#ec4899,#8b5cf6);--border:#f0d5e8;--shadow:0 4px 24px rgba(236,72,153,.08);--radius:20px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(236,72,153,.04) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(139,92,246,.04) 0%,transparent 50%);z-index:-1}
.container{max-width:480px;margin:0 auto;padding:12px}
.prize-banner{background:linear-gradient(135deg,#fbbf24,#f59e0b,#ec4899);border-radius:16px;padding:14px;text-align:center;margin-bottom:12px;color:#fff;position:relative;overflow:hidden}
.prize-banner::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 50%,rgba(255,255,255,.15),transparent 60%);pointer-events:none}
.prize-banner .prize-title{font-size:15px;font-weight:800;margin-bottom:6px}
.prize-banner .prize-pool{font-size:13px;font-weight:600;display:flex;justify-content:center;gap:16px}
.prize-banner .prize-pool span{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:99px}
.prize-banner .prize-countdown{font-size:12px;margin-top:5px;opacity:.9}
.comp-banner{background:linear-gradient(135deg,rgba(236,72,153,.1),rgba(139,92,246,.1));border-radius:12px;padding:10px 14px;text-align:center;margin-bottom:12px;font-size:14px;font-weight:600;line-height:1.5;display:none}
.comp-banner .hl{color:#ec4899;font-size:18px}
.total-votes{text-align:center;color:var(--sub);font-size:12px;margin-bottom:10px}
.cp-card{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;border:2px solid transparent;position:relative}
.cp-card.voted{border-color:var(--pink)}
.cp-card .rank{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:var(--bg);flex-shrink:0}
.cp-card .rank.top1{width:46px;height:46px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;font-size:24px;box-shadow:0 0 0 3px rgba(251,191,36,.3)}
.cp-card .rank.top2{background:linear-gradient(135deg,#c0c0c0,#9ca3af);color:#fff}
.cp-card .rank.top3{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
.cp-card .info{flex:1;min-width:0}
.cp-card .cp-name{font-size:16px;font-weight:700;margin-bottom:1px}
.cp-card .cp-from{font-size:11px;color:var(--sub)}
.cp-card .gap-badge{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;margin-top:4px;line-height:1.5}
.cp-card .gap-badge.leading{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff}
.cp-card .gap-badge.chasing{background:linear-gradient(135deg,#ec4899,#8b5cf6);color:#fff}
.cp-card .votes{text-align:center;min-width:44px}
.cp-card .votes .num{font-size:20px;font-weight:800;background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.cp-card .votes .label{font-size:10px;color:var(--sub)}
.vote-btn-sm{background:var(--accent);color:#fff;border:none;padding:6px 12px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;flex-shrink:0}
.vote-btn-sm:hover{opacity:.9;transform:scale(1.05)}
.vote-btn-sm:disabled{opacity:.4;cursor:default;transform:none}
.vote-btn-sm.done{background:#9ca3af}
.progress-section{background:var(--card);border-radius:var(--radius);padding:18px;margin-top:14px;box-shadow:var(--shadow);display:none}
.progress-section .prog-title{font-size:15px;font-weight:700;margin-bottom:4px;text-align:center}
.progress-section .prog-desc{font-size:12px;color:var(--sub);text-align:center;margin-bottom:10px}
.progress-section .prog-bar{height:20px;background:var(--border);border-radius:99px;overflow:hidden;position:relative;margin-bottom:6px}
.progress-section .prog-bar .fill{height:100%;background:linear-gradient(90deg,#ec4899,#fbbf24);border-radius:99px;transition:width .4s;min-width:4%}
.progress-section .prog-bar .prog-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.progress-section .prog-steps{display:flex;justify-content:space-between;font-size:10px;color:var(--sub);margin-bottom:12px}
.progress-section .prog-step{text-align:center;flex:1;position:relative}
.progress-section .prog-step.done{color:var(--pink);font-weight:700}
.progress-section .prog-action{text-align:center;margin-top:6px}
.progress-section .prog-action button{background:var(--accent);color:#fff;border:none;padding:10px 28px;border-radius:99px;font-size:14px;font-weight:700;cursor:pointer;width:100%}
.progress-section .prog-action button:hover{opacity:.9}
.progress-section .prog-tip{font-size:11px;color:var(--sub);text-align:center;margin-top:6px}
.extra-votes-badge{background:linear-gradient(135deg,#ec4899,#8b5cf6);color:#fff;padding:2px 10px;border-radius:99px;font-size:12px;font-weight:700;display:inline-block;margin-bottom:8px}
.buy-section{background:var(--card);border-radius:var(--radius);padding:16px;margin-top:10px;box-shadow:var(--shadow);text-align:center}
.buy-section .buy-title{font-size:14px;font-weight:700;margin-bottom:8px}
.buy-section .buy-options{display:flex;gap:10px;justify-content:center}
.buy-section .buy-opt{flex:1;border:2px solid var(--border);border-radius:12px;padding:12px 8px;cursor:pointer;transition:.15s;text-align:center}
.buy-section .buy-opt:hover{border-color:var(--pink)}
.buy-section .buy-opt .price{font-size:18px;font-weight:800;background:var(--accent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.buy-section .buy-opt .desc{font-size:11px;color:var(--sub);margin-top:4px}
.footer{text-align:center;padding:16px;color:var(--sub);font-size:11px;margin-top:10px}
.footer a{color:var(--purple);text-decoration:none}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:600;z-index:100;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
  <div class="prize-banner" id="prize-banner">
    <div class="prize-title">🏆 第1期投票赛</div>
    <div class="prize-pool">
      <span>🥇 ¥1,000</span>
      <span>🥈 ¥500</span>
      <span>🥉 ¥300</span>
    </div>
    <div class="prize-countdown" id="prize-countdown"></div>
  </div>

  <div id="comp-banner" class="comp-banner"></div>
  <div class="total-votes" id="total-votes">加载中...</div>
  <div id="cp-list"></div>

  <div id="progress-section" class="progress-section">
    <div class="prog-title">🎰 你的进度</div>
    <div class="prog-desc" id="prog-desc">差1人得3票，帮你家CP冲榜！</div>
    <div class="prog-bar">
      <div class="fill" id="prog-fill" style="width:10%"></div>
      <div class="prog-label" id="prog-label">1/10</div>
    </div>
    <div class="prog-steps">
      <span class="prog-step" data-step="0">拉0人</span>
      <span class="prog-step" data-step="1">🎁 拉1人</span>
      <span class="prog-step" data-step="3">🎁 拉3人</span>
      <span class="prog-step" data-step="5">🎁 拉5人</span>
      <span class="prog-step" data-step="10">🏆 拉10人</span>
    </div>
    <div class="prog-action">
      <button id="prog-share-btn" onclick="copyRefLink()">📋 复制拉人链接</button>
    </div>
    <div class="prog-tip" id="prog-tip">每拉1人你获得3票，可投给你爱的CP</div>
  </div>

  <div id="extra-votes-area" style="text-align:center;margin-top:10px;display:none">
    <span class="extra-votes-badge" id="extra-votes-badge">🎯 你有 0 张额外票</span>
  </div>

  <div id="buy-section" class="buy-section" style="display:none">
    <div class="buy-title">💪 买额外票，助CP反超</div>
    <div class="buy-options">
      <div class="buy-opt" onclick="buyTickets(5)">
        <div class="price">¥5</div>
        <div class="desc">5 票</div>
      </div>
      <div class="buy-opt" onclick="buyTickets(12)">
        <div class="price">¥10</div>
        <div class="desc">12 票</div>
      </div>
    </div>
    <div style="font-size:10px;color:var(--sub);margin-top:6px">支付接入中...</div>
  </div>

  <div class="footer">
    <p>GL CP 竞技场 · 纯属娱乐 · <a href="?data" onclick="showData();return false">📊 数据</a></p>
    <p style="font-size:10px;margin-top:4px">本活动为CP粉丝娱乐投票赛，购买额外票数为自愿支持行为</p>
  </div>

  <div id="data-panel" style="display:none;background:var(--card);border-radius:var(--radius);padding:20px;margin-top:16px;box-shadow:var(--shadow)">
    <h3 style="margin-bottom:14px;font-size:15px">📊 数据面板</h3>
    <div style="display:grid;gap:12px;font-size:13px" id="data-supabase-wrap"></div>
    <div id="data-local" style="margin-top:10px;padding:10px;background:var(--bg);border-radius:10px;font-size:12px;color:var(--sub)"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ Config ═══
const SUPABASE_URL = 'https://oefzzmflkdoigfahbskc.supabase.co'
const SUPABASE_KEY = 'sb_publishable_R3EGbB23qba66lweHNbLjQ_gzxxVnqB'
function supabaseAPI(path, opts = {}) {
  return fetch(SUPABASE_URL + '/rest/v1/' + path, { ...opts, headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, ...(opts.headers||{}) } }).then(r => r.json()).catch(() => null)
}

const CP_LIST = [
  {id:1, name:'忧城 × 千景', from:'《恋语轻唱》', votes:0, color:'#a78bfa'},
  {id:2, name:'小糸侑 × 七海灯子', from:'《终将成为你》', votes:0, color:'#60a5fa'},
  {id:3, name:'安达 × 岛村', from:'《安达与岛村》', votes:0, color:'#f472b6'},
  {id:4, name:'LingLing × Orm', from:'《我们的秘密》', votes:0, color:'#fbbf24'},
  {id:5, name:'Freen × Becky', from:'《粉红理论》', votes:0, color:'#fb923c'},
  {id:6, name:'Milk × Love', from:'《地球倾斜23.5度》', votes:0, color:'#34d399'},
  {id:7, name:'Faye × Yoko', from:'《爱填满空白》', votes:0, color:'#e879f9'},
  {id:8, name:'Namtan × Film', from:'《冥王星》', votes:0, color:'#38bdf8'},
  {id:9, name:'席娜 × 美美', from:'《与妳相恋到生命尽头》', votes:0, color:'#f87171'},
  {id:10, name:'甘露寺蜜璃 × 胡蝶忍', from:'《鬼灭之刃》', votes:0, color:'#fb7185'},
]

// ═══ State ═══
let hasVotedBase = false       // 每日免费票是否已用
let deviceFingerprint = ''
let isAdmin = location.search.includes('admin')
let lastVotedCpId = null
let extraVotes = 0             // 额外票（拉人+购买）
let refCount = 0               // 拉了多少人
let hasVotedAny = false        // 是否投过票（控制进度条显示）

// ═══ Init ═══
async function init() {
  deviceFingerprint = getFingerprint()
  loadLocal()
  checkRef()
  await loadVotes()
  render()
  initCountdown()
  updateProgressUI()
}
init()

function getFingerprint() {
  const stored = localStorage.getItem('glcp_fp')
  if (!stored) {
    const fpId = 'fp_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36)
    localStorage.setItem('glcp_fp', fpId)
    return fpId
  }
  return stored
}

function loadLocal() {
  extraVotes = parseInt(localStorage.getItem('glcp_extra') || '0')
  refCount = parseInt(localStorage.getItem('glcp_refcount') || '0')
  hasVotedAny = !!localStorage.getItem('glcp_voted_' + deviceFingerprint)
}

function saveLocal() {
  localStorage.setItem('glcp_extra', String(extraVotes))
  localStorage.setItem('glcp_refcount', String(refCount))
}

// ═══ Referral Check ═══
function checkRef() {
  const params = new URLSearchParams(location.search)
  const ref = params.get('ref')
  if (ref && ref.startsWith('share_') && ref !== 'share_' + deviceFingerprint) {
    // This user was referred by someone
    localStorage.setItem('glcp_referrer', ref)
    // Track this referral in Supabase for the referrer
    const refs = JSON.parse(localStorage.getItem('glcp_refs') || '[]')
    if (!refs.includes(ref)) {
      refs.push(ref)
      localStorage.setItem('glcp_refs', JSON.stringify(refs))
    }
    showToast('🎯 朋友邀请你来投票！投了你的CP，TA也能得奖励')
  }
}

// ═══ Data ═══
async function loadVotes() {
  try {
    let all = [], off = 0
    while (true) {
      const b = await supabaseAPI('votes?select=cp_id,voter_fingerprint,created_at&limit=1000&offset=' + off)
      if (!b || !b.length) break
      all = all.concat(b)
      if (b.length < 1000) break
      off += 1000
    }
    const counts = {}
    all.forEach(r => {
      if (r.voter_fingerprint && r.voter_fingerprint.startsWith('seed_')) return
      const cid = parseInt(r.cp_id); counts[cid] = (counts[cid] || 0) + 1
    })
    CP_LIST.forEach(cp => { cp.votes = counts[cp.id] || 0 })

    const my = all.filter(r => r.voter_fingerprint === deviceFingerprint)
    if (my.length) {
      my.sort((a,b) => new Date(b.created_at) - new Date(a.created_at))
      hasVotedBase = Date.now() < new Date(my[0].created_at).getTime() + 86400000
      if (hasVotedBase) hasVotedAny = true
    }
  } catch(e) {
    const stored = JSON.parse(localStorage.getItem('glcp_votes') || '{}')
    CP_LIST.forEach(cp => { cp.votes = stored[cp.id] || 0 })
    hasVotedBase = !!localStorage.getItem('glcp_voted_' + deviceFingerprint)
  }
  saveLocal()
}

// ═══ Render ═══
function render() {
  const sorted = [...CP_LIST].sort((a,b) => b.votes - a.votes)
  const total = sorted.reduce((s,c) => s + c.votes, 0)

  document.getElementById('total-votes').textContent = (total > 0 ? `共 ${total} 票 · ` : '') + `${CP_LIST.length} 对CP参赛`

  const banner = document.getElementById('comp-banner')
  if (sorted[0] && sorted[1]) {
    const gap = sorted[0].votes - sorted[1].votes
    if (gap > 0) banner.innerHTML = '🔥 <span class="hl">' + sorted[0].name.split('×')[0] + '</span> 领先 <span class="hl">' + sorted[1].name.split('×')[0] + '</span> <span class="hl">' + gap + '</span> 票'
    else banner.innerHTML = '🔥 <span class="hl">' + sorted[0].name.split('×')[0] + '</span> 与 <span class="hl">' + sorted[1].name.split('×')[0] + '</span> 胶着！'
    banner.style.display = 'block'
  } else banner.style.display = 'none'

  document.getElementById('cp-list').innerHTML = sorted.map((cp, i) => {
    const gap = i > 0 ? sorted[i-1].votes - cp.votes : 0
    const isFirst = i === 0
    const badgeClass = isFirst ? 'gap-badge leading' : 'gap-badge chasing'
    const badgeText = isFirst ? (gap > 0 ? '🏆 领先 ' + gap + ' 票' : '🏆 第1') : '🔺 差 ' + gap + ' 票可反超'
    const freeDisabled = hasVotedBase && !isAdmin
    const canExtr = extraVotes > 0 && !isAdmin
    return `<div class="cp-card ${cp.id === lastVotedCpId ? 'voted' : ''}">
      <div class="rank ${i<3?'top'+(i+1):''}">${i === 0 ? '👑' : (i+1)}</div>
      <div class="info">
        <div class="cp-name">${cp.name}</div>
        <div class="cp-from">${cp.from}</div>
        <div class="${badgeClass}">${badgeText}</div>
      </div>
      <div class="votes">
        <div class="num">${cp.votes}</div>
        <div class="label">票</div>
      </div>
      <div style="display:flex;gap:4px;flex-direction:column">
        <button class="vote-btn-sm ${freeDisabled?'done':''}" onclick="voteFree(${cp.id})" ${freeDisabled?'disabled':''}>${freeDisabled?'已投':'投票'}</button>
        ${canExtr ? `<button class="vote-btn-sm" onclick="voteExtra(${cp.id})" style="background:#8b5cf6">+${extraVotes}</button>` : ''}
      </div>
    </div>`
  }).join('')

  // Show extra votes area
  const extraArea = document.getElementById('extra-votes-area')
  if (extraVotes > 0) {
    extraArea.style.display = 'block'
    document.getElementById('extra-votes-badge').textContent = '🎯 你有 ' + extraVotes + ' 张额外票'
  } else {
    extraArea.style.display = 'none'
  }

  // Show buy section
  document.getElementById('buy-section').style.display = 'block'
}

// ═══ Vote: Free Daily ═══
async function voteFree(cpId) {
  if (hasVotedBase && !isAdmin) { showToast('每天限投1票，明天再来！'); return }
  await doVote(cpId, deviceFingerprint)
}

// ═══ Vote: Extra ═══
async function voteExtra(cpId) {
  if (extraVotes <= 0) { showToast('没有额外票了'); return }
  extraVotes--
  saveLocal()
  await doVote(cpId, deviceFingerprint)
}

async function doVote(cpId, fp) {
  const cp = CP_LIST.find(c => c.id === cpId)
  if (!cp) return
  cp.votes++
  hasVotedBase = true
  hasVotedAny = true
  lastVotedCpId = cpId
  localStorage.setItem('glcp_voted_' + deviceFingerprint, '1')

  const voteFp = isAdmin ? 'seed_admin_' + fp : fp
  fetch(SUPABASE_URL + '/rest/v1/votes', {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ cp_id: cpId, voter_fingerprint: voteFp })
  }).catch(() => {})

  render()
  updateProgressUI()
  showToast('投票成功！🎉')
}

// ═══ Extra Votes from Referral ═══
function addExtraVotes(n) {
  extraVotes += n
  saveLocal()
  render()
  updateProgressUI()
  showToast('🎉 获得了 ' + n + ' 张额外票！')
}

// ═══ Progress Bar ═══
function updateProgressUI() {
  const sec = document.getElementById('progress-section')
  if (hasVotedAny) {
    sec.style.display = 'block'
  } else {
    sec.style.display = 'none'
    return
  }

  const pct = Math.min(refCount / 10 * 100, 100)
  document.getElementById('prog-fill').style.width = pct + '%'
  document.getElementById('prog-label').textContent = refCount + '/10'

  const steps = document.querySelectorAll('.prog-step')
  steps.forEach(s => {
    const n = parseInt(s.dataset.step)
    if (refCount >= n && n > 0) s.classList.add('done')
    else s.classList.remove('done')
  })

  // Update description
  if (refCount >= 10) {
    document.getElementById('prog-desc').textContent = '🏆 已完成！继续拉人获得更多额外票'
  } else {
    document.getElementById('prog-desc').textContent = '已拉 ' + refCount + ' 人，再拉 ' + (10 - refCount) + ' 人获得10张额外票'
  }
}

// ═══ Share / Referral ═══
function copyRefLink() {
  const refId = 'share_' + deviceFingerprint
  const link = location.origin + location.pathname + '?ref=' + refId
  navigator.clipboard.writeText(link).then(() => {
    showToast('🔗 链接已复制！朋友通过这个链接投票，你获得奖励')
  }).catch(() => showToast('复制失败，请手动复制地址栏'))
}

// Called when someone votes through your ref link (from localStorage tracking)
function checkAndRewardReferrals() {
  const refs = JSON.parse(localStorage.getItem('glcp_refs') || '[]')
  const processed = JSON.parse(localStorage.getItem('glcp_refs_processed') || '[]')
  let newRefs = refs.filter(r => !processed.includes(r))
  if (newRefs.length > 0) {
    addExtraVotes(newRefs.length * 3)
    const allProcessed = [...processed, ...newRefs]
    localStorage.setItem('glcp_refs_processed', JSON.stringify(allProcessed))
    refCount += newRefs.length
    saveLocal()
    updateProgressUI()
  }
}

// ═══ Buy Tickets (UI only - payment coming) ═══
function buyTickets(count) {
  showToast('支付功能即将上线，敬请期待！')
}

// ═══ Countdown ═══
const COMPETITION_START = new Date()
const COMPETITION_DAYS = 7

function initCountdown() {
  const el = document.getElementById('prize-countdown')
  function tick() {
    const now = new Date()
    const end = new Date(COMPETITION_START.getTime() + COMPETITION_DAYS * 86400000)
    const left = end - now
    if (left <= 0) {
      el.textContent = '⏰ 本期已结束！'
      return
    }
    const d = Math.floor(left / 86400000)
    const h = Math.floor((left % 86400000) / 3600000)
    el.textContent = '⏰ 还剩 ' + d + ' 天 ' + h + ' 小时'
  }
  tick()
  setInterval(tick, 60000)
}

// ═══ Admin Panel ═══
function showData() {
  const panel = document.getElementById('data-panel')
  if (panel.style.display === 'block') { panel.style.display = 'none'; return }
  panel.style.display = 'block'
  const localEl = document.getElementById('data-local')
  localEl.innerHTML = '<p>设备: ' + deviceFingerprint.substring(0, 20) + '...<br>'
    + '免费票: ' + (hasVotedBase ? '已用' : '可用') + '<br>'
    + '额外票: ' + extraVotes + '<br>'
    + '已拉人数: ' + refCount + '</p>'
  if (isAdmin) loadSupabaseStats()
  panel.scrollIntoView({behavior:'smooth'})
}

async function loadSupabaseStats() {
  const wrap = document.getElementById('data-supabase-wrap')
  try {
    let all = [], off = 0
    while (true) {
      const batch = await fetch(SUPABASE_URL + '/rest/v1/votes?select=cp_id,voter_fingerprint&limit=1000&offset=' + off, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      }).then(r => r.json()).catch(() => [])
      if (!batch || !batch.length) break
      all = all.concat(batch); if (batch.length < 1000) break; off += 1000
    }
    const counts = {}, seedCount = {}
    all.forEach(r => { counts[r.cp_id] = (counts[r.cp_id] || 0) + 1; if (r.voter_fingerprint?.startsWith('seed_')) seedCount[r.cp_id] = (seedCount[r.cp_id] || 0) + 1 })
    const realVotes = all.length - Object.values(seedCount).reduce((a,b) => a+b, 0)
    let html = '<div style="padding:12px;background:rgba(139,92,246,.06);border-radius:12px;border:1px solid rgba(139,92,246,.15)">'
    html += '<strong>总票数：' + all.length + '</strong> · 真实投票：<strong style="color:#ec4899">' + realVotes + '</strong> 票<br>'
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 14px;margin-top:6px;font-size:12px">'
    CP_LIST.sort((a,b) => (counts[b.id]||0) - (counts[a.id]||0)).forEach(cp => {
      const c = counts[cp.id] || 0; const s = Math.max(0, c - (seedCount[cp.id] || 0))
      html += '<div>' + cp.name.split('×')[0] + '</div><div style="text-align:right"><strong>' + c + '</strong>' + (s > 0 ? ' <span style="color:#ec4899;font-size:10px">(+' + s + ')</span>' : '') + '</div>'
    })
    html += '</div><div style="margin-top:4px;font-size:11px;color:var(--sub)">种子票 ≈ ' + (all.length - realVotes) + ' · 真实票 ≈ ' + realVotes + '</div></div>'
    wrap.innerHTML = html
  } catch(e) {
    wrap.innerHTML = '<div style="padding:12px;background:var(--bg);border-radius:12px;color:var(--sub);font-size:12px">加载失败</div>'
  }
}

function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2500)
}

setInterval(checkAndRewardReferrals, 5000)
